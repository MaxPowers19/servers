name: Submit New MCP Server
description: Submit a new remote MCP server to the directory
title: "[NEW SERVER]: "
labels: ["new-server", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        ## Submit a New Remote MCP Server
        Thank you for contributing to RemoteMCPList! Please fill out the information below.
        
  - type: input
    id: server_id
    attributes:
      label: Server ID
      description: Unique identifier (lowercase, hyphens only, e.g., github-mcp)
      placeholder: github-mcp
    validations:
      required: true
      
  - type: input
    id: name
    attributes:
      label: Server Name
      description: Display name for the server
      placeholder: GitHub MCP Server
    validations:
      required: true
      
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Primary category for this server
      options:
        - development
        - data-analysis
        - communication
        - payments
        - cloud
        - productivity
        - security
        - database
        - ai-ml
        - monitoring
    validations:
      required: true
      
  - type: textarea
    id: description
    attributes:
      label: Short Description
      description: Brief description (20-200 characters)
      placeholder: What does this server do in one sentence?
    validations:
      required: true
      
  - type: textarea
    id: long_description
    attributes:
      label: Detailed Description
      description: Comprehensive description with use cases (must be longer than short description)
      placeholder: Provide detailed information about the server's capabilities, use cases, and benefits...
    validations:
      required: true
      
  - type: input
    id: endpoint
    attributes:
      label: Production Endpoint URL
      description: HTTPS endpoint for the remote MCP server
      placeholder: https://api.example.com/mcp
    validations:
      required: true
      
  - type: input
    id: sandbox_endpoint
    attributes:
      label: Sandbox Endpoint URL (Optional)
      description: Optional sandbox/testing endpoint
      placeholder: https://sandbox.example.com/mcp
    validations:
      required: false
      
  - type: dropdown
    id: auth_type
    attributes:
      label: Authentication Type
      options:
        - oauth2
        - api-key
        - none
    validations:
      required: true
      
  - type: input
    id: auth_provider
    attributes:
      label: Authentication Provider
      description: Provider name (e.g., github, google, custom)
      placeholder: github
    validations:
      required: true
      
  - type: textarea
    id: auth_instructions
    attributes:
      label: Authentication Instructions
      description: Step-by-step instructions for obtaining credentials
      placeholder: |
        1. Go to Settings > Developer settings
        2. Generate a new API token
        3. Select the required scopes
        4. Copy the token to your MCP configuration
    validations:
      required: true
      
  - type: textarea
    id: capabilities
    attributes:
      label: Main Capabilities
      description: List the main capabilities with IDs and descriptions
      placeholder: |
        repository.read - Read repository contents and metadata
        issues.manage - Create, update, and close issues
        pulls.review - Review and manage pull requests
    validations:
      required: true
      
  - type: input
    id: maintainer_name
    attributes:
      label: Maintainer Name
      description: Your name or organization
    validations:
      required: true
      
  - type: input
    id: maintainer_github
    attributes:
      label: Maintainer GitHub Username
      description: GitHub username (without @)
      placeholder: username
    validations:
      required: true
      
  - type: input
    id: maintainer_website
    attributes:
      label: Maintainer Website (Optional)
      description: Website or domain (e.g., example.com or https://example.com)
      placeholder: example.com
    validations:
      required: false
      
  - type: textarea
    id: tags
    attributes:
      label: Tags
      description: Tags for search/filtering (comma-separated)
      placeholder: github, version-control, development, mcp, remote
    validations:
      required: true
      
  - type: checkboxes
    id: verification
    attributes:
      label: Verification
      description: Please confirm the following
      options:
        - label: I have tested this server and confirm it works
          required: true
        - label: This server is actively maintained
          required: true
        - label: The server follows MCP protocol standards
          required: true
        - label: I am the maintainer or have permission to submit
          required: true
        - label: This is a REMOTE MCP server (not a local server)
          required: true