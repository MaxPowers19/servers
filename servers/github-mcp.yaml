id: github-mcp
name: GitHub MCP Server
category: development
description: Complete GitHub integration for MCP - manage repos, issues, PRs, and
  more
long_description: "The GitHub MCP Server provides comprehensive access to GitHub's\
  \ API through the Model Context Protocol.\nIt enables AI assistants to read repositories,\
  \ manage issues, create pull requests, review code, and \ninteract with GitHub Actions.\
  \ Perfect for automating development workflows and code management tasks.\n"
maintainer:
  name: Anthropic
  github: anthropic
  website: https://anthropic.com
authentication:
  type: oauth2
  provider: github
  instructions: '1. Go to GitHub Settings > Developer settings > Personal access tokens

    2. Generate a new token with repo, issues, and pull_request scopes

    3. Configure the token in your MCP client

    '
endpoints:
  production: wss://github-mcp.modelcontextprotocol.io
capabilities:
- id: repository.read
  name: Read Repositories
  description: Access repository contents, branches, and commits
- id: repository.write
  name: Write Repositories
  description: Create and modify files in repositories
- id: issues.manage
  name: Manage Issues
  description: Create, update, and close GitHub issues
- id: pulls.create
  name: Create Pull Requests
  description: Create and manage pull requests
- id: actions.trigger
  name: Trigger Actions
  description: Run GitHub Actions workflows
tags:
- github
- git
- version-control
- development
- collaboration
- ci-cd
verification:
  status: verified
  tested_date: '2024-12-10T00:00:00Z'
  security_audit: true
featured: false
