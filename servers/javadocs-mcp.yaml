id: javadocs-mcp
name: Javadocs.dev
category: development

description: Browse and search Java, Kotlin, and Scala library documentation from Maven Central
long_description: |
  The Javadocs.dev MCP server provides programmatic access to Java, Kotlin, and Scala
  library documentation from Maven Central. Query for the latest version of any artifact,
  browse the complete contents of javadoc jars, and retrieve full documentation for 
  specific classes and methods. Built with ZIO and designed for efficient access to
  Maven Central's vast documentation repository. Perfect for AI assistants and development
  tools that need instant access to Java API documentation.

maintainer:
  name: James Ward
  github: jamesward
  website: javadocs.dev

authentication:
  type: none
  provider: none
  instructions: |
    No authentication required. The Javadocs.dev MCP server is publicly accessible
    and can be used immediately without any API keys or credentials.

endpoints:
  production: https://www.javadocs.dev/mcp

capabilities:
  - id: get_latest_version
    name: Get Latest Version
    description: Gets the latest version of a given artifact (requires group ID and artifact ID)
  - id: get_javadoc_content_list
    name: Get Javadoc Content List
    description: Gets a list of the contents of a javadoc jar (requires group ID, artifact ID, and version)
  - id: get_javadoc_symbol_contents
    name: Get Javadoc Symbol Contents
    description: Gets the contents of a javadoc symbol - get the symbol link from the content list tool first

tags:
  - documentation
  - java
  - kotlin
  - scala
  - remote

verification:
  status: pending
  tested_date: "2025-08-19T00:00:00Z"
  security_audit: false

featured: false
